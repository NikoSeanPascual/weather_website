<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <title>Niko's Weather App</title>
</head>
<body>
<div class="theme-switch" onclick="toggleTheme()">
    <span id="theme-icon">🌙</span>
</div>
<h1>Niko's Weather App</h1>

<div id="weather">
    <div id="weather-effects"></div>

    <div class="input-group">
        <input type="text" id="cityInput" placeholder="Enter city name">
        <div class="button-row">
            <button onclick="getWeather()">Search</button>
            <button id="locationBtn" onclick="getLocation()">🔴</button>
        </div>
    </div>

    <div id="cityLists">
        <div class="list-section">
            <h4>Favorites
                <span>
                    <button class="clear-btn" onclick="clearList('favorites')">Clear</button>
                    <span id="setDefault" title="Set current as Home" onclick="setDefaultCity()">🏠</span>
                    <span id="addFavorite" onclick="toggleFavorite()">★</span>
                </span>
            </h4>
            <div id="favoritesList" class="chip-container"></div>
        </div>
        <div class="list-section">
            <h4>Recent
                <button class="clear-btn" onclick="clearList('recents')">Clear</button>
            </h4>
            <div id="recentList" class="chip-container"></div>
        </div>
    </div>

    <!-- WRAPPER 1: Current Weather -->
    <div class="current-weather-wrapper">
        <img id="weatherIcon" style="display:none; margin: 0 auto;">
        <h2 id="cityName"></h2>
        <p id="temperature"></p>
        <p id="feelsLike"></p>
        <p id="description"></p>
        <p id="rainChance"></p>

        <div class="weather-details">
            <p id="humidity"></p>
            <p id="wind"></p>
        </div>

        <div class="weather-details secondary">
            <p id="pressure"></p>
            <p id="visibility"></p>
            <p id="uvIndex"></p>
        </div>

        <div class="weather-details tertiary">
            <p id="dewPoint"></p>
            <p id="aqi"></p>
            <div class="sun-times">
                <p id="sunrise"></p>
                <p id="sunset"></p>
            </div>
        </div>
        <p id="error"></p>
    </div>

    <!-- WRAPPER 2: Forecast & Charts -->
    <div class="extended-weather-wrapper">
        <div id="forecastContainer" style="display: none;">
            <h3 class="forecast-title">Next 24 Hours</h3>
            <div id="hourlyForecast" class="hourly-scroll"></div>

            <h3 class="forecast-title">5-Day Overview</h3>
            <div id="dailyForecast" class="daily-grid"></div>
        </div>

        <div id="chartsContainer" style="display: none; margin-top: 20px;">
            <h3 class="forecast-title">24-Hour Trends</h3>
            <div class="chart-wrapper">
                <canvas id="tempChart"></canvas>
            </div>
            <div class="chart-wrapper">
                <canvas id="rainChart"></canvas>
            </div>
            <div class="chart-wrapper">
                <canvas id="windChart"></canvas>
            </div>
        </div>

        <div id="comparisonSection" style="display: none; margin-top: 20px;">
            <h3 class="forecast-title">City Comparison</h3>
            <div id="comparisonGrid" class="comparison-grid"></div>
        </div>
        <button id="compareBtn" onclick="toggleComparison()" style="margin-top: 10px; font-size: 1rem; padding: 8px;">
            Compare Favorites
        </button>
    </div>
</div>

<div class="cursor-dot"></div>
<div class="cursor-outline"></div>

<script src="script.js"></script>
</body>
</html>
